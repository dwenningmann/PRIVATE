<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Executive Primer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .snapshot-card { 
            background: linear-gradient(180deg, #0a0a0a 0%, #000 100%); 
            border: 1px solid rgba(255,255,255,0.05); 
            box-shadow: 0 50px 100px -20px rgba(0,0,0,1);
        }
        .glow-gold { text-shadow: 0 0 30px rgba(245, 158, 11, 0.4); }
        .grain {
            position: absolute; inset: 0; opacity: 0.02; pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
    </style>
</head>
<body class="p-6 flex flex-col items-center min-h-screen justify-center">

    <div id="capture-area" class="snapshot-card rounded-[3rem] p-10 md:p-16 w-full max-w-sm aspect-[4/5] flex flex-col justify-between relative overflow-hidden">
        <div class="grain"></div>
        <div class="absolute top-0 right-0 p-8 opacity-[0.03] font-black text-7xl italic leading-none select-none">SYSTEM</div>
        
        <div class="w-16 h-1 bg-amber-500 mb-8 relative z-10"></div>
        
        <h2 id="quote-text" class="text-3xl md:text-4xl font-black italic uppercase leading-[0.9] tracking-tighter glow-gold relative z-10">
            Lade <br>System...
        </h2>
        
        <div class="relative z-10">
            <span class="block text-[9px] font-black uppercase tracking-[0.5em] text-amber-600 mb-2">Market Value Doctrine</span>
            <div class="flex items-center gap-2">
                <span class="h-[1px] w-4 bg-gray-800"></span>
                <span class="text-[9px] font-bold text-gray-500 uppercase tracking-widest">Architect Level</span>
            </div>
        </div>
    </div>

    <div class="mt-12 grid grid-cols-2 gap-4 w-full max-w-sm">
        <button onclick="nextQuote()" class="py-4 bg-white/5 border border-white/10 rounded-2xl text-[10px] font-black uppercase tracking-widest text-gray-400 hover:bg-white/10 transition-all">Next Signal</button>
        <button onclick="shareWhatsApp()" class="py-4 bg-amber-500 text-black rounded-2xl text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-amber-500/20">
            Share Text
        </button>
    </div>
    
    <a href="index.html" class="mt-8 text-[9px] uppercase tracking-widest text-gray-600 hover:text-white transition-colors">← Return to Hub</a>

    <script>
        const quotes = [
            "Disziplin ist kein Zustand. Es ist ein System.",
            "Der Markt bezahlt Ergebnisse, keine Bemühungen.",
            "Architekten bauen. Coder führen aus.",
            "Stärke entsteht in der Stille, nicht im Lärm.",
            "Wer nicht Nein sagen kann, hat keine Strategie.",
            "Stand Fast. Der Fels bewegt sich nicht.",
            "Komplexität ist der Feind der Skalierung.",
            "Echte Führung ist einsam. Gewöhn dich dran.",
            "Dein Marktwert folgt deiner Disziplin.",
            "Keine Ausreden. Nur Architektur.",
            "KI ist dein Hebel. Nutze ihn oder werde zum Stein.",
            "Probleme sind Rohstoff für Lösungen.",
            "Mittelmaß ist eine bewusste Entscheidung.",
            "Baue Systeme, die ohne dich funktionieren.",
            "Fokus ist die Währung des Architekten.",
            "Strategie ohne Ausführung ist Halluzination.",
            "Erfolg hinterlässt Spuren. Analysiere sie.",
            "Sei das System, nicht das Rädchen.",
            "Emotionen sind Daten, keine Anweisungen.",
            "Der Schmerz der Disziplin ist leichter als der Reue.",
            "Agieren statt reagieren. Immer.",
            "Dein Output ist dein einziges Zeugnis.",
            "Geschwindigkeit ist ein Wettbewerbsvorteil.",
            "Lerne die Regeln, um sie zu brechen.",
            "Infrastruktur schlägt Motivation.",
            "Wachstum liegt außerhalb der Komfortzone.",
            "Ein Leader schafft Klarheit aus Chaos.",
            "Besitz die Verantwortung, teile den Erfolg.",
            "Das Ziel ist Freiheit durch Architektur.",
            "Unaufhaltsam durch Systematik."
        ];

        function nextQuote() {
            const text = quotes[Math.floor(Math.random() * quotes.length)];
            // Ersetzt Punkte durch Zeilenumbrüche für das Design
            document.getElementById('quote-text').innerHTML = text.replace(/\. /g, '. <br>');
        }

        function shareWhatsApp() {
            const text = document.getElementById('quote-text').innerText;
            const url = `whatsapp://send?text=${encodeURIComponent("*Doctrine Signal:* \n\n" + '"' + text + '"')}`;
            window.location.href = url;
        }

        // Initialer Quote
        nextQuote();
    </script>
</body>
</html>
