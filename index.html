<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>My App Cloud</title>
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #ffffff;
            --accent: #bb86fc;
            --gold: #f59e0b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        h1 { font-size: 2rem; margin-bottom: 5px; letter-spacing: -1px; }
        .status { color: #03dac6; font-size: 0.8rem; font-weight: bold; text-transform: uppercase; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .app-item {
            background: var(--card-bg);
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
            transition: transform 0.1s;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .app-item:active { transform: scale(0.95); background: #2c2c2c; }

        /* Spezial-Style für die 150k Doctrine */
        .app-item.doctrine {
            border: 1px solid rgba(245, 158, 11, 0.3);
            background: linear-gradient(145deg, #1e1e1e, #261a05);
        }

        .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .label { font-size: 0.85rem; font-weight: 600; line-height: 1.2; }
        .desc { font-size: 0.65rem; color: #94a3b8; margin-top: 4px; font-weight: 400; }

        .coming-soon { opacity: 0.2; filter: grayscale(1); }
    </style>
</head>
<body>

    <header>
        <div class="status">● System Online</div>
        <h1>Personal Apps</h1>
    </header>

    <div class="app-grid">
        <a href="sodoku.html" class="app-item">
            <div class="icon">🧩</div>
            <div class="label">Sudoku</div>
            <div class="desc">Werbefreies Zen</div>
        </a>

        <a href="150k.html" class="app-item doctrine">
            <div class="icon" style="text-shadow: 0 0 10px rgba(245,158,11,0.5)">📜</div>
            <div class="label" style="color: var(--gold)">150k Doctrine</div>
            <div class="desc" style="color: rgba(245,158,11,0.6)">The Market Value</div>
        </a>

        <div class="app-item coming-soon">
            <div class="icon">🛒</div>
            <div class="label">Einkauf</div>
            <div class="desc">Lokal gespeichert</div>
        </div>

        <div class="app-item coming-soon">
            <div class="icon">📊</div>
            <div class="label">Sprit</div>
            <div class="desc">Verbrauchs-Log</div>
        </div>
    </div>

</body>
</html>
