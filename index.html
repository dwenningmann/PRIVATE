<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>David | Executive Hub</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0c0c0c;
            --text: #ffffff;
            --gold: #f59e0b;
            --emerald: #10b981;
            --blue: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(28, 100%, 50%, 0.03) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .status-bar { 
            font-size: 8px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 0.4em; 
            color: #444;
            margin-bottom: 8px;
        }

        h1 { 
            font-size: 1.6rem; 
            font-weight: 900; 
            margin: 0; 
            letter-spacing: -1px; 
            text-transform: uppercase;
            font-style: italic;
        }

        .section-label {
            width: 100%;
            max-width: 400px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #444;
            margin: 25px 0 12px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after { content: ""; flex: 1; height: 1px; background: #1a1a1a; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            width: 100%;
            max-width: 400px;
        }

        .app-item {
            background: var(--card-bg);
            aspect-ratio: 1 / 1;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }

        .app-item:active { transform: scale(0.94); background: #111; }

        /* Branding Colors */
        .item-summit { border: 1px solid rgba(16, 185, 129, 0.2); background: linear-gradient(145deg, #0c0c0c, #061a12); }
        .item-doctrine { border: 1px solid rgba(245, 158, 11, 0.2); background: linear-gradient(145deg, #0c0c0c, #1a140a); }
        .item-breath { border: 1px solid rgba(59, 130, 246, 0.2); }

        .icon { font-size: 2.2rem; margin-bottom: 12px; }
        .label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        .desc { font-size: 0.6rem; color: #555; margin-top: 4px; }

        .item-summit .label { color: var(--emerald); }
        .item-doctrine .label { color: var(--gold); }
        .item-breath .label { color: var(--blue); }
    </style>
</head>
<body>

    <header>
        <div class="status-bar">● Authenticated // David</div>
        <h1>Executive <span style="color:var(--gold)">Hub</span></h1>
    </header>

    <div class="section-label">Agency Division</div>
    <div class="app-grid">
        <a href="summit.html" class="app-item item-summit">
            <div class="icon" style="text-shadow: 0 0 15px rgba(16, 185, 129, 0.4)">🏔️</div>
            <div class="label">up2summit</div>
            <div class="desc">Acquisition Terminal</div>
        </a>
        <div class="app-item" style="opacity: 0.1; filter: grayscale(1);">
            <div class="icon">📊</div>
            <div class="label">ROI Calc</div>
            <div class="desc">Coming Soon</div>
        </div>
    </div>

    <div class="section-label">Personal Strategy</div>
    <div class="app-grid">
        <a href="mindset.html" class="app-item item-doctrine">
            <div class="icon">💡</div>
            <div class="label">Daily Primer</div>
            <div class="desc">Mindset & Share</div>
        </a>
        <a href="connector.html" class="app-item item-doctrine">
            <div class="icon">🤝</div>
            <div class="label">LinkedIn Conn</div>
            <div class="desc">Network Growth</div>
        </a>
        <a href="150k.html" class="app-item item-doctrine">
            <div class="icon" style="text-shadow: 0 0 15px rgba(245,158,11,0.4)">📜</div>
            <div class="label">Doctrine</div>
            <div class="desc">The Manifesto</div>
        </a>
        <a href="breath.html" class="app-item item-breath">
            <div class="icon" style="text-shadow: 0 0 15px rgba(59, 130, 246, 0.4)">🫁</div>
            <div class="label">Breathe Tech</div>
            <div class="desc">System Reset</div>
        </a>
    </div>

    <div class="section-label">Utilities</div>
    <div class="app-grid">
        <a href="sodoku.html" class="app-item">
            <div class="icon">🧩</div>
            <div class="label">Sudoku</div>
            <div class="desc">Zen Mode</div>
        </a>
    </div>

</body>
</html>
