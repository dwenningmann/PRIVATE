<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>David | Executive Hub</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0c0c0c;
            --text: #ffffff;
            --gold: #f59e0b;
            --emerald: #10b981;
            --blue: #3b82f6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(at 0% 0%, hsla(28, 100%, 50%, 0.04) 0px, transparent 50%);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        .status-bar { 
            font-size: 8px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 0.4em; 
            color: #444;
            margin-bottom: 8px;
        }

        h1 { 
            font-size: 1.6rem; 
            font-weight: 900; 
            margin: 0; 
            letter-spacing: -1px; 
            text-transform: uppercase;
            font-style: italic;
        }

        .section-label {
            width: 100%;
            max-width: 400px;
            font-size: 9px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            color: #333;
            margin: 25px 0 12px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-label::after { content: ""; flex: 1; height: 1px; background: #111; }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
            width: 100%;
            max-width: 400px;
        }

        .app-item {
            background: var(--card-bg);
            aspect-ratio: 1 / 1;
            border-radius: 26px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.03);
            padding: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        .app-item:active { transform: scale(0.94); background: #111; }

        /* Branding Borders */
        .item-doctrine { border: 1px solid rgba(245, 158, 11, 0.15); }
        .item-sniper { border: 1px solid rgba(245, 158, 11, 0.3); background: linear-gradient(145deg, #0c0c0c, #1a140a); }
        .item-summit { border: 1px solid rgba(16, 185, 129, 0.15); }

        .icon { font-size: 2.1rem; margin-bottom: 10px; }
        .label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
        .desc { font-size: 0.6rem; color: #555; margin-top: 4px; line-height: 1.2; }

        .gold-text { color: var(--gold); }
        .emerald-text { color: var(--emerald); }
    </style>
</head>
<body>

    <header>
        <div class="status-bar">● Authenticated // David</div>
        <h1>Personal <span style="color:var(--gold)">Leader Hub</span></h1>
    </header>

    <div class="section-label">Branding & Network</div>
    <div class="app-grid">
        <a href="sniper.html" class="app-item item-sniper">
            <div class="icon" style="text-shadow: 0 0 15px rgba(245,158,11,0.5)">🎯</div>
            <div class="label gold-text">Comment Sniper</div>
            <div class="desc">High-Value Interaction</div>
        </a>
        <a href="connector.html" class="app-item item-doctrine">
            <div class="icon">🤝</div>
            <div class="label gold-text">Connector</div>
            <div class="desc">Network Growth</div>
        </a>
        <a href="mindset.html" class="app-item item-doctrine">
            <div class="icon">💡</div>
            <div class="label gold-text">Daily Primer</div>
            <div class="desc">Mindset & Share</div>
        </a>
        <a href="150k.html" class="app-item item-doctrine">
            <div class="icon">📜</div>
            <div class="label gold-text">150k Doctrine</div>
            <div class="desc">The Manifesto</div>
        </a>
    </div>

    <div class="section-label">Performance</div>
    <div class="app-grid">
        <a href="breath.html" class="app-item" style="border-color: rgba(59, 130, 246, 0.2);">
            <div class="icon">🫁</div>
            <div class="label" style="color:var(--blue)">Breathe Tech</div>
            <div class="desc">System Reset</div>
        </a>
        <a href="summit.html" class="app-item item-summit">
            <div class="icon">🏔️</div>
            <div class="label emerald-text">up2summit</div>
            <div class="desc">Agency Division</div>
        </a>
    </div>

    <div class="section-label">Zen</div>
    <div class="app-grid">
        <a href="sodoku.html" class="app-item" style="opacity: 0.4;">
            <div class="icon">🧩</div>
            <div class="label" style="color:#666">Sudoku</div>
            <div class="desc">Focus Training</div>
        </a>
    </div>

</body>
</html>
